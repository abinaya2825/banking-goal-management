<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vault — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f19;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0ece4;
      --muted: rgba(240,236,228,0.45);
      --error: #e05252;
      --success: #52c07a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* Left panel */
    .hero {
      position: relative;
      background: linear-gradient(145deg, #0f1628 0%, #1a0e2e 50%, #0c1820 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(201,168,76,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(82,192,122,0.06) 0%, transparent 60%);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: drift 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(201,168,76,0.15); top: -80px; right: -80px; animation-delay: 0s; }
    .orb-2 { width: 200px; height: 200px; background: rgba(82,192,122,0.1); bottom: 60px; left: -60px; animation-delay: -3s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .hero-content { position: relative; z-index: 1; }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4rem;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(to right, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 4vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 380px;
      font-weight: 300;
    }

    .stats-row {
      display: flex;
      gap: 2.5rem;
      margin-top: 3.5rem;
    }

    .stat { }
    .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold-light);
    }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Right panel — form */
    .form-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      background: var(--bg);
      position: relative;
    }

    .form-panel::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
    }

    .form-card {
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    .form-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--gold);
      background: rgba(201,168,76,0.05);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    input::placeholder { color: rgba(240,236,228,0.25); }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: #0b0f19;
      letter-spacing: 0.05em;
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
    .btn-primary:active { transform: translateY(0); }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.12) 100%);
    }

    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(11,15,25,0.3);
      border-top-color: #0b0f19;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    .alert-error { background: rgba(224,82,82,0.12); border: 1px solid rgba(224,82,82,0.3); color: #f08080; }
    .alert-success { background: rgba(82,192,122,0.12); border: 1px solid rgba(82,192,122,0.3); color: #52c07a; }

    .hint {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .hero { display: none; }
      .form-panel::before { display: none; }
    }
  </style>
</head>
<body>

  <!-- Left Hero -->
  <div class="hero">
    <div class="hero-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="hero-content">
      <div class="logo">
        <div class="logo-icon">🏦</div>
        <span class="logo-name">Vault</span>
      </div>
      <h1 class="hero-headline">Financial goals,<br/>beautifully tracked.</h1>
      <p class="hero-sub">Set targets, monitor progress, and reach every milestone — all in one elegant dashboard.</p>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val">₹0</div>
          <div class="stat-label">Total saved</div>
        </div>
        <div class="stat">
          <div class="stat-val">0</div>
          <div class="stat-label">Active goals</div>
        </div>
        <div class="stat">
          <div class="stat-val">∞</div>
          <div class="stat-label">Possibilities</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Form -->
  <div class="form-panel">
    <div class="form-card">
      <h2 class="form-title">Welcome back</h2>
      <p class="form-subtitle">Sign in to access your financial vault</p>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter any username" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter any password" autocomplete="current-password"/>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Sign In</button>

      <div class="alert alert-error" id="alertEl"></div>

      <p class="hint">Any username and password will work — this is a demo.</p>
    </div>
  </div>

  <script>
    // If already logged in, redirect
    if (localStorage.getItem('vault_user')) {
      window.location.href = 'dashboard.html';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const btn = document.getElementById('loginBtn');
      const alert = document.getElementById('alertEl');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      alert.style.display = 'none';

      if (!username) {
        showAlert('Please enter a username.'); return;
      }
      if (!password) {
        showAlert('Please enter a password.'); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';

      await new Promise(r => setTimeout(r, 900)); // Simulate auth delay

      localStorage.setItem('vault_user', JSON.stringify({ username, loginTime: Date.now() }));
      window.location.href = 'dashboard.html';
    }

    function showAlert(msg) {
      const el = document.getElementById('alertEl');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
